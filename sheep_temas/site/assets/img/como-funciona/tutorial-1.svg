<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 170 170" width="170" height="170">
  <defs>
    <radialGradient id="bg1" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#fff5f5"/>
      <stop offset="100%" stop-color="#ffe0e0"/>
    </radialGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="85" cy="85" r="85" fill="url(#bg1)"/>

  <!-- Plate shadow -->
  <ellipse cx="85" cy="118" rx="52" ry="7" fill="#e8c8a0" opacity="0.5"/>

  <!-- Pizza group: translate fixo, scale animado via nested group -->
  <g transform="translate(85,82)">
    <g>
      <!-- Scale animado sem additive -->
      <animateTransform attributeName="transform" type="scale"
        values="0.2;1.08;1" keyTimes="0;0.65;1" dur="1.2s" begin="0s" fill="freeze"/>

      <!-- Crust -->
      <circle cx="0" cy="0" r="44" fill="#d4884a"/>
      <!-- Sauce -->
      <circle cx="0" cy="0" r="38" fill="#cc1a1a"/>
      <!-- Cheese -->
      <circle cx="0" cy="0" r="32" fill="#f5c842"/>

      <!-- Slice dividers -->
      <line x1="0" y1="-32" x2="0" y2="32" stroke="#d4884a" stroke-width="1.5" opacity="0.6"/>
      <line x1="-27.7" y1="-16" x2="27.7" y2="16" stroke="#d4884a" stroke-width="1.5" opacity="0.6"/>
      <line x1="-27.7" y1="16" x2="27.7" y2="-16" stroke="#d4884a" stroke-width="1.5" opacity="0.6"/>

      <!-- Pepperoni -->
      <circle cx="0" cy="-18" r="5" fill="#a51515"/>
      <circle cx="0" cy="-18" r="3" fill="#cc2222"/>
      <circle cx="15" cy="10" r="5" fill="#a51515"/>
      <circle cx="15" cy="10" r="3" fill="#cc2222"/>
      <circle cx="-15" cy="10" r="5" fill="#a51515"/>
      <circle cx="-15" cy="10" r="3" fill="#cc2222"/>

      <!-- Mushrooms -->
      <ellipse cx="-8" cy="-5" rx="4" ry="3" fill="#8B6914"/>
      <ellipse cx="8" cy="5" rx="4" ry="3" fill="#8B6914"/>

      <!-- Olive -->
      <circle cx="5" cy="-8" r="3" fill="#2d4a1e"/>
      <circle cx="5" cy="-8" r="1.5" fill="#1a3010"/>
    </g>
  </g>

  <!-- Sparkles piscando -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1;0" dur="1.5s" begin="0.9s" repeatCount="indefinite"/>
    <text x="128" y="48" font-size="13" fill="#f5c842" font-family="Arial">✦</text>
    <text x="20" y="54" font-size="10" fill="#cc1a1a" font-family="Arial">✦</text>
    <text x="133" y="108" font-size="9" fill="#f5c842" font-family="Arial">✦</text>
  </g>

  <!-- Badge número 1 -->
  <circle cx="148" cy="28" r="14" fill="#cc1a1a"/>
  <text x="148" y="33" text-anchor="middle" font-size="13" font-weight="bold" fill="white" font-family="Arial, sans-serif">1</text>
</svg>

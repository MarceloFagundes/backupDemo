<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 170 170" width="170" height="170">
  <defs>
    <radialGradient id="bg2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#fff8f0"/>
      <stop offset="100%" stop-color="#ffe8cc"/>
    </radialGradient>
  </defs>

  <circle cx="85" cy="85" r="85" fill="url(#bg2)"/>

  <!-- Road / ground line -->
  <line x1="10" y1="128" x2="160" y2="128" stroke="#ccc" stroke-width="2" stroke-dasharray="8,6"/>

  <!-- Speed lines (behind moto) -->
  <g opacity="0.4">
    <animate attributeName="opacity" values="0.1;0.5;0.1" dur="0.5s" repeatCount="indefinite"/>
    <line x1="10" y1="100" x2="45" y2="100" stroke="#cc1a1a" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="15" y1="108" x2="40" y2="108" stroke="#cc1a1a" stroke-width="2" stroke-linecap="round"/>
    <line x1="8" y1="116" x2="38" y2="116" stroke="#cc1a1a" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Moto group - moves right then loops -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="-10,0;5,0;0,0" keyTimes="0;0.6;1" dur="1s" begin="0s" fill="freeze"/>

    <!-- Back wheel -->
    <circle cx="65" cy="120" r="14" fill="none" stroke="#130f40" stroke-width="5"/>
    <circle cx="65" cy="120" r="4" fill="#130f40"/>

    <!-- Front wheel -->
    <circle cx="115" cy="120" r="14" fill="none" stroke="#130f40" stroke-width="5"/>
    <circle cx="115" cy="120" r="4" fill="#130f40"/>

    <!-- Wheel spin indicator -->
    <line x1="65" y1="106" x2="65" y2="134" stroke="#555" stroke-width="2">
      <animateTransform attributeName="transform" type="rotate" values="0,65,120;360,65,120" dur="0.4s" repeatCount="indefinite"/>
    </line>
    <line x1="115" y1="106" x2="115" y2="134" stroke="#555" stroke-width="2">
      <animateTransform attributeName="transform" type="rotate" values="0,115,120;360,115,120" dur="0.4s" repeatCount="indefinite"/>
    </line>

    <!-- Moto body -->
    <polygon points="68,118 72,100 100,100 108,110 112,118" fill="#cc1a1a"/>
    <rect x="72" y="96" width="30" height="8" rx="3" fill="#a51515"/>

    <!-- Handlebar -->
    <line x1="108" y1="103" x2="118" y2="98" stroke="#130f40" stroke-width="3" stroke-linecap="round"/>

    <!-- Engine block -->
    <rect x="78" y="108" width="22" height="12" rx="2" fill="#a51515"/>

    <!-- Exhaust pipe -->
    <path d="M68,116 Q58,118 55,122" stroke="#888" stroke-width="3" fill="none" stroke-linecap="round"/>

    <!-- Rider body -->
    <rect x="82" y="83" width="20" height="20" rx="5" fill="#130f40"/>

    <!-- Helmet -->
    <ellipse cx="92" cy="80" rx="13" ry="11" fill="#cc1a1a"/>
    <ellipse cx="92" cy="80" rx="11" ry="9" fill="#cc1a1a"/>
    <!-- Visor -->
    <rect x="83" y="77" width="18" height="7" rx="3" fill="#130f40" opacity="0.8"/>

    <!-- Arm holding pizza bag -->
    <line x1="100" y1="88" x2="112" y2="84" stroke="#130f40" stroke-width="5" stroke-linecap="round"/>

    <!-- Pizza bag -->
    <rect x="108" y="74" width="20" height="16" rx="3" fill="#f5c842"/>
    <rect x="110" y="72" width="16" height="4" rx="2" fill="#d4a820"/>
    <text x="118" y="85" text-anchor="middle" font-size="7" fill="#a51515" font-weight="bold" font-family="Arial, sans-serif">🍕</text>
  </g>

  <!-- Step number badge -->
  <circle cx="148" cy="28" r="14" fill="#cc1a1a"/>
  <text x="148" y="33" text-anchor="middle" font-size="13" font-weight="bold" fill="white" font-family="Arial, sans-serif">3</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 170 170" width="170" height="170">
  <defs>
    <radialGradient id="bg4" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#fff9e6"/>
      <stop offset="100%" stop-color="#fff0c0"/>
    </radialGradient>
  </defs>

  <circle cx="85" cy="85" r="85" fill="url(#bg4)"/>

  <!-- Pizza slice - drop in from top -->
  <g transform="translate(85,88)">
    <animateTransform attributeName="transform" type="translate" values="85,20;85,92;85,88" keyTimes="0;0.7;1" dur="1s" begin="0s" fill="freeze"/>

    <!-- Slice shape (triangle) -->
    <polygon points="0,-50 -36,20 36,20" fill="#d4884a"/>
    <!-- Sauce layer -->
    <polygon points="0,-42 -30,18 30,18" fill="#cc1a1a"/>
    <!-- Cheese layer -->
    <polygon points="0,-36 -25,16 25,16" fill="#f5c842"/>

    <!-- Crust arc at bottom -->
    <path d="M-36,20 Q0,32 36,20 L36,20 Q0,26 -36,20Z" fill="#d4884a"/>

    <!-- Pepperoni on slice -->
    <circle cx="0" cy="-10" r="6" fill="#a51515"/>
    <circle cx="0" cy="-10" r="4" fill="#cc2222"/>
    <circle cx="-14" cy="8" r="5" fill="#a51515"/>
    <circle cx="-14" cy="8" r="3" fill="#cc2222"/>
    <circle cx="14" cy="8" r="5" fill="#a51515"/>
    <circle cx="14" cy="8" r="3" fill="#cc2222"/>

    <!-- Cheese drip -->
    <path d="M-10,16 Q-12,22 -10,26" stroke="#f5c842" stroke-width="3" fill="none" stroke-linecap="round">
      <animate attributeName="d" values="M-10,16 Q-12,18 -10,18;M-10,16 Q-12,22 -10,26" dur="0.8s" begin="0.8s" fill="freeze"/>
    </path>
    <path d="M8,16 Q10,22 8,26" stroke="#f5c842" stroke-width="2.5" fill="none" stroke-linecap="round">
      <animate attributeName="d" values="M8,16 Q10,18 8,18;M8,16 Q10,22 8,26" dur="0.8s" begin="1s" fill="freeze"/>
    </path>
  </g>

  <!-- Steam wisps -->
  <g>
    <path d="M72,50 Q68,42 72,35" stroke="#ddd" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0">
      <animate attributeName="opacity" values="0;0.8;0" dur="1.5s" begin="0.5s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0,5;0,-5" dur="1.5s" begin="0.5s" repeatCount="indefinite"/>
    </path>
    <path d="M85,45 Q81,36 85,28" stroke="#ddd" stroke-width="2" fill="none" stroke-linecap="round" opacity="0">
      <animate attributeName="opacity" values="0;0.7;0" dur="1.5s" begin="0.8s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0,5;0,-5" dur="1.5s" begin="0.8s" repeatCount="indefinite"/>
    </path>
    <path d="M98,50 Q102,42 98,35" stroke="#ddd" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0">
      <animate attributeName="opacity" values="0;0.8;0" dur="1.5s" begin="1.1s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0,5;0,-5" dur="1.5s" begin="1.1s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Happy face (fork and knife) -->
  <!-- Fork left -->
  <g transform="translate(32,80)">
    <animateTransform attributeName="transform" type="rotate" values="30,32,100;-5,32,100;0,32,100" keyTimes="0;0.6;1" dur="1s" begin="0.2s" fill="freeze"/>
    <rect x="30" y="60" width="5" height="35" rx="2.5" fill="#130f40"/>
    <rect x="28" y="60" width="1.5" height="12" rx="0.75" fill="#130f40"/>
    <rect x="31" y="60" width="1.5" height="12" rx="0.75" fill="#130f40"/>
    <rect x="34" y="60" width="1.5" height="12" rx="0.75" fill="#130f40"/>
  </g>

  <!-- Knife right -->
  <g transform="translate(100,80)">
    <animateTransform attributeName="transform" type="rotate" values="-30,120,100;5,120,100;0,120,100" keyTimes="0;0.6;1" dur="1s" begin="0.2s" fill="freeze"/>
    <rect x="118" y="60" width="5" height="35" rx="2.5" fill="#130f40"/>
    <polygon points="118,60 123,60 123,75 118,75" fill="#888"/>
  </g>

  <!-- Sparkles / stars around -->
  <g>
    <animate attributeName="opacity" values="0;1;0" dur="1.5s" begin="1s" repeatCount="indefinite"/>
    <text x="18" y="75" font-size="14" fill="#f5c842">★</text>
    <text x="138" y="70" font-size="11" fill="#cc1a1a">★</text>
    <text x="25" y="130" font-size="9" fill="#f5c842">✦</text>
    <text x="140" y="130" font-size="10" fill="#cc1a1a">✦</text>
  </g>

  <!-- Step number badge -->
  <circle cx="148" cy="28" r="14" fill="#cc1a1a"/>
  <text x="148" y="33" text-anchor="middle" font-size="13" font-weight="bold" fill="white" font-family="Arial, sans-serif">4</text>
</svg>

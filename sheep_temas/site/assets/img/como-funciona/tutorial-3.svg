<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 170 170" width="170" height="170">
  <defs>
    <radialGradient id="bg3" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#f0f5ff"/>
      <stop offset="100%" stop-color="#dce8ff"/>
    </radialGradient>
    <filter id="shadow3">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#00000022"/>
    </filter>
  </defs>

  <circle cx="85" cy="85" r="85" fill="url(#bg3)"/>

  <!-- Card body - slide in from top -->
  <g filter="url(#shadow3)">
    <animateTransform attributeName="transform" type="translate" values="0,-60;0,5;0,0" keyTimes="0;0.6;1" dur="1s" begin="0s" fill="freeze"/>
    <rect x="35" y="52" width="100" height="66" rx="8" fill="#130f40"/>
    <!-- Card stripe -->
    <rect x="35" y="70" width="100" height="16" fill="#1e1870"/>
    <!-- Chip -->
    <rect x="48" y="57" width="18" height="14" rx="3" fill="#f5c842"/>
    <rect x="51" y="60" width="12" height="8" rx="1" fill="#d4a820" opacity="0.7"/>
    <!-- Card number dots -->
    <circle cx="55" cy="97" r="3" fill="white" opacity="0.7"/>
    <circle cx="65" cy="97" r="3" fill="white" opacity="0.7"/>
    <circle cx="75" cy="97" r="3" fill="white" opacity="0.7"/>
    <circle cx="85" cy="97" r="3" fill="white" opacity="0.7"/>
    <circle cx="95" cy="97" r="3" fill="white" opacity="0.7"/>
    <circle cx="105" cy="97" r="3" fill="white" opacity="0.7"/>
    <!-- Expiry -->
    <text x="48" y="113" font-size="7" fill="white" opacity="0.6" font-family="Arial, sans-serif">05/29</text>
    <!-- Visa-like logo -->
    <text x="100" y="113" font-size="9" fill="white" font-weight="bold" font-family="Arial, sans-serif" opacity="0.9">VISA</text>
  </g>

  <!-- Checkmark circle - pop in after card -->
  <g transform="translate(118, 95)">
    <circle cx="0" cy="0" r="0" fill="#22c55e">
      <animate attributeName="r" values="0;16;14" keyTimes="0;0.7;1" dur="0.5s" begin="0.9s" fill="freeze"/>
    </circle>
    <polyline points="-6,0 -2,5 7,-5" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.2s" begin="1.2s" fill="freeze"/>
    </polyline>
  </g>

  <!-- Coins bouncing -->
  <g>
    <circle cx="42" cy="125" r="10" fill="#f5c842">
      <animate attributeName="cy" values="125;118;125" dur="1.2s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    <text x="42" y="129" text-anchor="middle" font-size="9" fill="#a07010" font-weight="bold" font-family="Arial, sans-serif">R$</text>
  </g>

  <!-- Pix logo-ish badge -->
  <g>
    <rect x="58" y="116" width="32" height="18" rx="4" fill="#32bcad">
      <animate attributeName="y" values="116;109;116" dur="1.2s" begin="0.7s" repeatCount="indefinite"/>
    </rect>
    <text x="74" y="129" text-anchor="middle" font-size="8" fill="white" font-weight="bold" font-family="Arial, sans-serif">
      <animate attributeName="y" values="129;122;129" dur="1.2s" begin="0.7s" repeatCount="indefinite"/>
      PIX
    </text>
  </g>

  <!-- Step number badge -->
  <circle cx="148" cy="28" r="14" fill="#cc1a1a"/>
  <text x="148" y="33" text-anchor="middle" font-size="13" font-weight="bold" fill="white" font-family="Arial, sans-serif">2</text>
</svg>

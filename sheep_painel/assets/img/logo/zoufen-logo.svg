<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 80" width="350" height="80">
  <defs>
    <!-- Gradiente premium para o ícone -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#009EDB" />
      <stop offset="100%" stop-color="#006A9C" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#009EDB" />
      <stop offset="100%" stop-color="#33B5E5" />
    </linearGradient>
  </defs>

  <!-- ==========================================
       ÍCONE: Focado em Código e Sistemas (SaaS)
       Representa "tags" de código e fluxo de dados
       ========================================== -->
  <g transform="translate(10, 15)">
    <!-- Tag de abertura < -->
    <path d="M 22 8 L 6 25 L 22 42" fill="none" stroke="url(#primaryGrad)" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Tag de fechamento > -->
    <path d="M 42 8 L 58 25 L 42 42" fill="none" stroke="url(#primaryGrad)" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Barra central inclinada / -->
    <path d="M 38 4 L 26 46" fill="none" stroke="url(#accentGrad)" stroke-width="5" stroke-linecap="round" />
    
    <!-- Ponto de conexão (sistemas/inteligência) -->
    <circle cx="26" cy="46" r="3.5" fill="#0D1F35" />
    <circle cx="38" cy="4" r="3.5" fill="#0D1F35" />
  </g>

  <!-- ==========================================
       TEXTO: Zoufen Sistemas Inteligentes
       ========================================== -->
  <!-- "zoufen" -->
  <text x="85" y="44" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="38" font-weight="800" fill="#0D1F35" letter-spacing="-1.5">zoufen</text>
  
  <!-- "sistemas inteligentes" -->
  <text x="87" y="64" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#009EDB" letter-spacing="1.2" text-transform="uppercase">sistemas inteligentes</text>
</svg>
